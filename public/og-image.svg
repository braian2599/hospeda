<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" rx="0"/>

  <!-- Subtle pattern circles -->
  <circle cx="1050" cy="100" r="200" fill="#6366f1" opacity="0.06"/>
  <circle cx="150" cy="550" r="180" fill="#8b5cf6" opacity="0.05"/>
  <circle cx="600" cy="315" r="300" fill="#6366f1" opacity="0.03"/>

  <!-- Logo icon -->
  <rect x="120" y="200" width="64" height="64" rx="14" fill="url(#accent)"/>
  <text x="152" y="246" text-anchor="middle" font-family="system-ui, sans-serif" font-size="36">🏨</text>

  <!-- Title -->
  <text x="205" y="235" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" fill="white">Hospedá</text>

  <!-- Tagline -->
  <text x="205" y="278" font-family="system-ui, -apple-system, sans-serif" font-size="26" fill="#94a3b8">Gestión Hotelera Simple</text>

  <!-- Accent line -->
  <rect x="120" y="310" width="120" height="3" rx="1.5" fill="url(#accent)"/>

  <!-- Feature pills -->
  <rect x="120" y="340" width="140" height="36" rx="18" fill="#6366f1" opacity="0.15"/>
  <text x="190" y="364" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#a5b4fc">Reservas</text>

  <rect x="275" y="340" width="150" height="36" rx="18" fill="#6366f1" opacity="0.15"/>
  <text x="350" y="364" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#a5b4fc">Facturación</text>

  <rect x="440" y="340" width="120" height="36" rx="18" fill="#6366f1" opacity="0.15"/>
  <text x="500" y="364" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#a5b4fc">Caja</text>

  <rect x="575" y="340" width="140" height="36" rx="18" fill="#6366f1" opacity="0.15"/>
  <text x="645" y="364" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#a5b4fc">Reportes</text>

  <!-- CTA -->
  <rect x="120" y="410" width="240" height="48" rx="24" fill="url(#accent)"/>
  <text x="240" y="441" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="white">Comenzar gratis →</text>

  <!-- 30 days badge -->
  <text x="380" y="441" font-family="system-ui, sans-serif" font-size="14" fill="#64748b">30 días de prueba gratuita</text>

  <!-- Domain -->
  <text x="600" y="580" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#475569">hospeda.com</text>
</svg>
