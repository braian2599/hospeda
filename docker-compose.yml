services:
  # ── PostgreSQL ──
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hospeda}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-hospeda}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hospeda}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Next.js App ──
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - DATABASE_URL=postgresql://${POSTGRES_USER:-hospeda}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-hospeda}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-hospeda}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-hospeda}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://hospeda.com}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
      # OAuth (opcional)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      # Twilio SMS
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-}
      # Pagos
      MERCADOPAGO_ACCESS_TOKEN: ${MERCADOPAGO_ACCESS_TOKEN:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      # App
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://hospeda.com}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"

  # ── Nginx (reverse proxy + SSL termination) ──
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - nextjs

  # ── Migraciones + Seed (one-shot) ──
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - DATABASE_URL=postgresql://${POSTGRES_USER:-hospeda}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-hospeda}
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-hospeda}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-hospeda}
    command: >
      sh -c "
        echo '⏳ Esperando a PostgreSQL...' &&
        until npx prisma db push --skip-generate 2>/dev/null; do sleep 2; done &&
        echo '✅ Schema sincronizado' &&
        echo '🌱 Ejecutando seed...' &&
        npx tsx prisma/seed.ts &&
        echo '✅ Seed completado'
      "
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata: